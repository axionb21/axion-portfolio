{% extends "admin/base_admin.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="section-title">Site Settings</div>
<form method="POST" style="max-width:640px">
  <div class="form-group"><label>Tagline (shown on homepage)</label>
    <input type="text" name="tagline" value="{{ s.tagline or '' }}"></div>
  <div class="form-group"><label>About text</label>
    <textarea name="about_text">{{ s.about_text or '' }}</textarea></div>
  <div class="form-group"><label>Resume URL (upload PDF to Cloudinary elsewhere, paste link here)</label>
    <input type="text" name="resume_url" value="{{ s.resume_url or '' }}"></div>
  <div class="form-group"><label>GitHub URL</label>
    <input type="text" name="github_url" value="{{ s.github_url or '' }}"></div>
  <div class="form-group"><label>LinkedIn URL</label>
    <input type="text" name="linkedin_url" value="{{ s.linkedin_url or '' }}"></div>
  <div class="form-group"><label>Twitter URL</label>
    <input type="text" name="twitter_url" value="{{ s.twitter_url or '' }}"></div>
  <div class="form-group"><label>Discord handle</label>
    <input type="text" name="discord_handle" value="{{ s.discord_handle or '' }}"></div>
  <div class="form-group"><label>Email</label>
    <input type="text" name="email" value="{{ s.email or '' }}"></div>
  <div class="form-group"><label>Location</label>
    <input type="text" name="location" value="{{ s.location or '' }}"></div>
  <button class="btn btn-primary" type="submit">Save</button>
</form>
{% endblock %}

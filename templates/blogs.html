{% extends "base.html" %}
{% block title %}Blogs{% endblock %}
{% block content %}
<div class="section-title">Blogs</div>
<div class="card-grid">
  {% for b in items %}
  <a class="card" href="{{ url_for('public.blog_detail', slug=b.slug) }}">
    {% if b.cover_image_url %}<img src="{{ b.cover_image_url }}" alt="">{% endif %}
    <h3>{{ b.title }}</h3>
    <p>{{ b.published_at.strftime('%b %d, %Y') if b.published_at else "" }}</p>
  </a>
  {% else %}
  <p style="color:var(--text-dim)">No blog posts yet.</p>
  {% endfor %}
</div>
{% endblock %}

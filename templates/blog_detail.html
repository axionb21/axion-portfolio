{% extends "base.html" %}
{% block title %}{{ item.title }}{% endblock %}
{% block content %}
<div class="detail-header">
  <div class="breadcrumb">/blogs/{{ item.slug }}</div>
  <h1>{{ item.title }}</h1>
  <p style="color:var(--text-dim)">{{ item.published_at.strftime('%b %d, %Y') if item.published_at else "" }}</p>
  {% if item.cover_image_url %}<img src="{{ item.cover_image_url }}" style="width:100%;border-radius:3px;border:1px solid var(--border);margin:16px 0">{% endif %}
</div>
<div class="markdown-body">{{ html_content | safe }}</div>
{% endblock %}
